<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Mix Helper — PopUp</title>
        <!--style-->
        <style>
            body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 12px;
                width: 400px; }
            .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
            .row-vertical { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
            label { user-select: none; font-size: 13px; }
            input[type="checkbox"] { width: 18px; height: 18px; }input[type="password"], input[type="text"] { width: 100%; padding: 6px; font-size: 12px;
                                                                     border: 1px solid #ccc; border-radius: 4px; }
            textarea { width: 100%; padding: 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 80px; font-family: monospace; }
            .hint { color: #64748b; font-size: 11px; margin-top: 4px; }
            button { padding: 6px 12px; font-size: 12px; cursor: pointer; }
            .section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
            .section-title { font-weight: 600; font-size: 13px; margin-bottom: 8px; }
        </style>
    </head>
    <body>
        <h2>Налаштування</h2>
        <!--body-->
        <div class="row">
            <input id="toggle" type="checkbox" />
            <label for="toggle">Увімкнути кнопки на сторінці</label>
        </div>
        <div class="row" style="margin-top:8px">
            <button id="test">Перевірити Gemini</button>
        </div>
        <div class="row" style="margin-top:8px">
            <button id="listModels">Список моделей</button>
        </div>
        <div class="section">
            <div class="section-title">API ключ Gemini</div>
            <div class="row-vertical">
                <input id="apiKey" type="password" placeholder="AIza...">
                <button id="saveApiKey">Зберегти API ключ</button>
                <div class="hint" id="apiKeyMsg"></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Структура звіту AI (опціонально)</div>
            <div class="row-vertical">
<textarea id="reportStructure" placeholder="Залиште порожнім для стандартної
структури. Приклад:
ПЕРЕВІРЕНІ ФАЙЛИ:
[список файлів]
ОЦІНКА: [відсоток]
ВИСНОВОК: [текст]"></textarea>
                <button id="saveStructure">Зберегти структуру</button>
                <div class="hint" id="structureMsg"></div>
                <div class="hint">Якщо не вказано, використовується стандартна структура.</div>
            </div>
        </div>
        <div class="hint" style="margin-top: 12px;">Діє для вкладки з Mix SumDU, може
            знадобитись перезавантаження сторінки.</div>
        <script src="popup.js"></script>
    </body>
</html>
